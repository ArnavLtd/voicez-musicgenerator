<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOICE‑Z — Debug Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #16140f;
      color: #f1ead9;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      max-width: 680px;
      width: 100%;
      background: #1f1c14;
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(255,250,235,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    h1 {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: #ff9d2e;
    }
    .sub {
      color: #9c9483;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,250,235,0.06);
      padding-bottom: 1rem;
    }
    .sub code {
      background: #0d0c08;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #ff9d2e;
      word-break: break-all;
    }
    .field {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9c9483;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: #0d0c08;
      border: 1px solid rgba(255,250,235,0.1);
      border-radius: 8px;
      color: #f1ead9;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #ff9d2e;
    }
    textarea { resize: vertical; min-height: 70px; }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .row .field { flex: 1; min-width: 120px; }
    button {
      background: #ff9d2e;
      color: #1a1206;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 0 #c97a1f;
    }
    button:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    button:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 0 0 #c97a1f;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 2px 0 #c97a1f;
    }
    button.secondary {
      background: #2a251a;
      color: #f1ead9;
      box-shadow: 0 4px 0 #1a160d;
    }
    button.secondary:hover:not(:disabled) {
      background: #3a3426;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1rem 0 0.5rem;
    }
    .btn-group button { flex: 1; min-width: 140px; justify-content: center; }
    .status-box {
      background: #0d0c08;
      border: 1px solid rgba(255,250,235,0.06);
      border-radius: 10px;
      padding: 16px 18px;
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 80px;
      max-height: 260px;
      overflow-y: auto;
      color: #9c9483;
      line-height: 1.5;
    }
    .status-box .highlight { color: #ff9d2e; }
    .status-box .ok { color: #7fd858; }
    .status-box .err { color: #ff4433; }
    audio {
      width: 100%;
      margin-top: 1rem;
      border-radius: 8px;
      accent-color: #ff9d2e;
    }
    .download-link {
      display: inline-block;
      color: #ff9d2e;
      text-decoration: none;
      font-weight: 600;
      margin-top: 0.5rem;
      border-bottom: 1px dotted rgba(255,157,46,0.3);
    }
    .download-link:hover { border-bottom-color: #ff9d2e; }
    .badge {
      display: inline-block;
      background: rgba(255,157,46,0.12);
      color: #ff9d2e;
      padding: 2px 12px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 8px;
    }
    hr {
      border: none;
      border-top: 1px solid rgba(255,250,235,0.06);
      margin: 1.25rem 0;
    }
    .job-id {
      font-family: 'Courier New', monospace;
      color: #7fd858;
      font-size: 0.8rem;
      background: rgba(127,216,88,0.06);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(127,216,88,0.15);
    }
    .flex-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    @media (max-width: 480px) {
      .container { padding: 1.25rem; }
      button { padding: 12px 18px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎛️ VOICE‑Z <span style="font-size:0.5em;color:#9c9483;font-weight:400;">debug panel</span></h1>
  <div class="sub">
    API Base: <code id="apiDisplay">loading...</code>
    <span class="badge">ngrok</span>
  </div>

  <!-- Track Title -->
  <div class="field">
    <label for="songTitle">Track Title</label>
    <input type="text" id="songTitle" placeholder="Untitled" value="Debug Test" />
  </div>

  <!-- Style Preset -->
  <div class="field">
    <label for="presetSelect">Style Preset <span style="color:#5c5747;font-weight:400;">(auto-fills prompt)</span></label>
    <select id="presetSelect">
      <option value="">— None —</option>
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
      <option value="ambient">Ambient</option>
      <option value="cinematic">Cinematic</option>
      <option value="lofi">Lo‑Fi</option>
      <option value="jazz">Jazz</option>
    </select>
  </div>

  <!-- Prompt -->
  <div class="field">
    <label for="promptText">Prompt</label>
    <textarea id="promptText" rows="3" placeholder="Describe your music...">A calm, introspective piano piece with soft string pads and a gentle wind chime, perfect for a rainy evening.</textarea>
  </div>

  <!-- Duration -->
  <div class="field">
    <label for="duration">Duration (seconds)</label>
    <input type="number" id="duration" value="30" min="10" max="360" step="5" />
  </div>

  <!-- Buttons -->
  <div class="btn-group">
    <button id="generateBtn">▶ Generate Track</button>
    <button id="checkStatusBtn" class="secondary" disabled>⟳ Check Status</button>
  </div>

  <!-- Job ID display -->
  <div class="flex-row" style="margin-top:0.5rem;">
    <span style="color:#5c5747;font-size:0.8rem;">Job ID:</span>
    <span id="jobIdDisplay" class="job-id">none</span>
  </div>

  <!-- Status Output -->
  <div class="status-box" id="statusOutput">⏳ Ready — generate a track, then click "Check Status".</div>

  <!-- Audio Player & Download -->
  <audio id="player" controls style="display:none;"></audio>
  <a id="downloadLink" class="download-link" href="#" download style="display:none;">⬇ Download track</a>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG — UPDATE THIS TO YOUR CURRENT NGROK URL
   ══════════════════════════════════════════════════════════ */
const API_BASE = 'https://everybody-countable-shone.ngrok-free.dev';

/* ─── DOM refs ──────────────────────────────────────────── */
const songTitle    = document.getElementById('songTitle');
const presetSelect = document.getElementById('presetSelect');
const promptText   = document.getElementById('promptText');
const duration     = document.getElementById('duration');
const generateBtn  = document.getElementById('generateBtn');
const checkBtn     = document.getElementById('checkStatusBtn');
const jobIdDisplay = document.getElementById('jobIdDisplay');
const statusBox    = document.getElementById('statusOutput');
const player       = document.getElementById('player');
const downloadLink = document.getElementById('downloadLink');
const apiDisplay   = document.getElementById('apiDisplay');

let currentJobId = null;

apiDisplay.textContent = API_BASE;

/* ─── PRESETS ────────────────────────────────────────────── */
const PRESETS = {
  pop: 'Upbeat pop with shimmering synths, a driving bass line, and a catchy chorus with handclaps and a bright electric piano.',
  rock: 'Heavy rock with distorted power chords, pounding drums, a growling bass, and a soaring guitar solo.',
  ambient: 'Slow, evolving ambient soundscape with soft synth pads, distant piano notes, and gentle field recordings of rain.',
  cinematic: 'Epic cinematic orchestral piece with sweeping strings, brass fanfares, and a powerful percussion build-up.',
  lofi: 'Chill lo-fi hip-hop beat with dusty vinyl crackle, mellow jazz piano loops, and a lazy, swung drum pattern.',
  jazz: 'Smooth jazz trio with walking bass, brushed snare, and a melodic piano improvisation over extended chords.'
};

presetSelect.addEventListener('change', function() {
  if (this.value && PRESETS[this.value]) {
    promptText.value = PRESETS[this.value];
  }
});

/* ─── HELPERS ────────────────────────────────────────────── */
function setStatus(text, type = 'info') {
  const colors = {
    info: '#9c9483',
    ok: '#7fd858',
    err: '#ff4433',
    warn: '#ff9d2e'
  };
  const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'highlight';
  statusBox.innerHTML = `<span class="${cls}">${text}</span>`;
}

function toast(msg) {
  setStatus(msg, 'info');
}

/* ─── GENERATE ───────────────────────────────────────────── */
generateBtn.addEventListener('click', async function() {
  const prompt = promptText.value.trim();
  const dur = parseInt(duration.value) || 30;
  if (!prompt) {
    setStatus('❌ Please enter a prompt.', 'err');
    return;
  }
  if (dur < 5) {
    setStatus('❌ Duration must be at least 5 seconds.', 'err');
    return;
  }

  this.disabled = true;
  checkBtn.disabled = true;
  currentJobId = null;
  jobIdDisplay.textContent = 'generating...';
  player.style.display = 'none';
  downloadLink.style.display = 'none';
  downloadLink.href = '#';
  setStatus('⏳ Sending generation request...', 'info');

  try {
    const fd = new FormData();
    fd.append('prompt', prompt);
    fd.append('duration', dur);
    // optional: send title (not used by backend but included for completeness)
    fd.append('title', songTitle.value.trim() || 'Untitled');

    const res = await fetch(`${API_BASE}/api/generate`, {
      method: 'POST',
      body: fd
    });

    const data = await res.json();
    console.log('[Generate] response:', data);

    if (!res.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    if (!data.jobId) {
      throw new Error('No jobId in response');
    }

    currentJobId = data.jobId;
    jobIdDisplay.textContent = currentJobId;
    checkBtn.disabled = false;
    setStatus(`✅ Generation started. Job ID: ${currentJobId}`, 'ok');
    toast('✅ Job started — click "Check Status" after 15–20 seconds.');
  } catch (err) {
    console.error('[Generate] error:', err);
    setStatus(`❌ Error: ${err.message}`, 'err');
  } finally {
    this.disabled = false;
  }
});

/* ─── CHECK STATUS ───────────────────────────────────────── */
checkBtn.addEventListener('click', async function() {
  if (!currentJobId) {
    setStatus('⚠️ No job ID. Generate a track first.', 'warn');
    return;
  }

  this.disabled = true;
  setStatus(`⏳ Checking status for ${currentJobId}...`, 'info');

  try {
    const res = await fetch(`${API_BASE}/api/status/${currentJobId}`);
    const data = await res.json();
    console.log('[Status] response:', data);

    if (!res.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    // Display the full response in a formatted way
    const pretty = JSON.stringify(data, null, 2);
    setStatus(`📦 Status response:\n${pretty}`, 'info');

    // Handle status
    if (data.status === 'completed') {
      setStatus('✅ Track completed! 🎵', 'ok');
      const src = data.audioUrl || data.file_path;
      if (src) {
        const fullUrl = src.startsWith('/') ? API_BASE + src : src;
        player.style.display = 'block';
        player.src = fullUrl;
        player.load();
        downloadLink.style.display = 'inline-block';
        downloadLink.href = fullUrl;
        downloadLink.download = `VOICEZ_${currentJobId.slice(0,8)}.mp3`;
        toast('🎵 Audio ready – use player or download.');
      } else {
        toast('⚠️ Completed but no audio URL.');
      }
    } else if (data.status === 'processing') {
      setStatus('⏳ Still processing... try again in a few seconds.', 'warn');
    } else if (data.status === 'queued') {
      setStatus('⏳ In queue. The server is busy.', 'warn');
    } else if (data.status === 'failed') {
      setStatus(`❌ Generation failed: ${data.error || 'unknown error'}`, 'err');
    } else {
      setStatus(`ℹ️ Unknown status: ${data.status}`, 'info');
    }
  } catch (err) {
    console.error('[Status] error:', err);
    setStatus(`❌ Status check error: ${err.message}`, 'err');
  } finally {
    this.disabled = false;
  }
});

/* ─── INIT ────────────────────────────────────────────────── */
setStatus('🟢 Ready. Generate a track, then click "Check Status".', 'info');
console.log('✅ VOICE‑Z Debug UI loaded.');
console.log(`   API_BASE = ${API_BASE}`);
console.log('ℹ️  Generate → wait 15–20s → Check Status.');
</script>
</body>
</html>
